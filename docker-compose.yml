version: '3.9'

networks:
  sentinel_net:
    driver: bridge

services:
  zookeeper:
    image: zookeeper:3.8.1
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - sentinel_net
    volumes:
      - zookeeper_data:/bitnami

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    depends_on:
      - zookeeper
    networks:
      - sentinel_net
    volumes:
      - kafka_data:/bitnami

  redis:
    image: redis:7-alpine
    networks:
      - sentinel_net
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/test
    networks:
      - sentinel_net
    volumes:
      - neo4j_data:/data

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sentinel
    networks:
      - sentinel_net
    volumes:
      - postgres_data:/var/lib/postgresql/data

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    depends_on: [kafka, postgres]
    networks:
      - sentinel_net
    ports:
      - "8000:8000"

  ingestion-service:
    build:
      context: .
      dockerfile: ingestion-service/Dockerfile
    environment:
      - SERVICE_NAME=ingestion-service
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://redis:6379/0
      - NORMALIZED_TOPIC=normalized-events.v1
    depends_on:
      - kafka
      - redis
    networks:
      - sentinel_net
    ports:
      - "8100:8100"

  evidence-service:
    build:
      context: .
      dockerfile: evidence-service/Dockerfile
    environment:
      - SERVICE_NAME=evidence-service
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
      - neo4j
    networks:
      - sentinel_net
    ports:
      - "8200:8200"

  attack-knowledge-service:
    build:
      context: ./attack-knowledge-service
      dockerfile: Dockerfile
    environment:
      - CONSUMER_TOPIC=evidence.graph.events.v1
      - PRODUCER_TOPIC=investigation.candidates.v1
    depends_on:
      - kafka
      - evidence-service
    networks:
      - sentinel_net
    ports:
      - "8300:8300"

  threat-intelligence-service:
    build:
      context: ./threat-intelligence-service
      dockerfile: Dockerfile
    environment:
      - CONSUMER_TOPIC=evidence.graph.events.v1
      - PRODUCER_TOPIC=investigation.candidates.v1
    depends_on:
      - kafka
      - evidence-service
    networks:
      - sentinel_net
    ports:
      - "8400:8400"

  knowledge-service:
    image: busybox
    command: sleep 3600
    networks:
      - sentinel_net

  investigation-service:
    build:
      context: ./investigation-service
      dockerfile: Dockerfile
    environment:
      - SERVICE_NAME=investigation-service
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CONSUMER_TOPIC=investigation.candidates.v1
      - PRODUCER_TOPIC=investigation.active.v1
      - CONSUMER_GROUP=investigation-service-group
    depends_on:
      - kafka
    networks:
      - sentinel_net
    ports:
      - "8500:8500"

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    environment:
      - AI_SERVICE_NAME=ai-investigation-service
      - AI_API_PORT=8600
      - INVESTIGATION_SERVICE_URL=http://investigation-service:8500
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SNAPSHOT_TOPIC=investigation.snapshot.created.v1
      - REASONED_TOPIC=investigation.reasoned.v1
      - REPORT_TOPIC=investigation.report.generated.v1
      - AI_METRICS_TOPIC=investigation.ai.metrics.v1
      - AI_CONSUMER_GROUP=ai-investigation-service-group
      - LLM_PROVIDER=mock
    depends_on:
      - kafka
      - investigation-service
    networks:
      - sentinel_net
    ports:
      - "8600:8600"

  execution-service:
    build:
      context: ./execution-service
      dockerfile: Dockerfile
    environment:
      - EXECUTION_SERVICE_NAME=execution-decision-service
      - EXECUTION_API_PORT=8700
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - INVESTIGATION_COMPLETED_TOPIC=investigation.completed.v1
      - EXECUTION_PLAN_CREATED_TOPIC=execution.plan.created.v1
      - EXECUTION_POLICY_CHECKED_TOPIC=execution.policy.checked.v1
      - EXECUTION_AWAITING_APPROVAL_TOPIC=execution.awaiting.approval.v1
      - EXECUTION_APPROVED_TOPIC=execution.approved.v1
      - EXECUTION_READY_TOPIC=execution.ready.v1
      - EXECUTION_STARTED_TOPIC=execution.started.v1
      - EXECUTION_COMPLETED_TOPIC=execution.completed.v1
      - EXECUTION_FAILED_TOPIC=execution.failed.v1
      - EXECUTION_CANCELLED_TOPIC=execution.cancelled.v1
      - EXECUTION_VERIFIED_TOPIC=execution.verified.v1
      - EXECUTION_AUDIT_TOPIC=execution.audit.v1
      - EXECUTION_CONSUMER_GROUP=execution-decision-service-group
    depends_on:
      - kafka
    networks:
      - sentinel_net
    ports:
      - "8700:8700"

  servicenow-adapter:
    build:
      context: ./servicenow-adapter
      dockerfile: Dockerfile
    environment:
      - SERVICENOW_ADAPTER_SERVICE_NAME=servicenow-execution-adapter
      - SERVICENOW_ADAPTER_API_PORT=8800
      - SERVICENOW_ADAPTER_LOG_LEVEL=INFO
      - SERVICENOW_BASE_URL=${SERVICENOW_BASE_URL}
      - SERVICENOW_USERNAME=${SERVICENOW_USERNAME}
      - SERVICENOW_PASSWORD=${SERVICENOW_PASSWORD}
      - SERVICENOW_AUTH_MODE=basic
      - SERVICENOW_VERIFY_SSL=true
      - SERVICENOW_TIMEOUT_SECONDS=20
      - SERVICENOW_RETRY_COUNT=3
      - SERVICENOW_RETRY_BASE_DELAY_MS=250
      - SERVICENOW_RETRY_MAX_DELAY_MS=5000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVICENOW_ADAPTER_CONSUMER_GROUP=servicenow-adapter-group
      - EXECUTION_READY_TOPIC=execution.ready.v1
      - EXECUTION_STARTED_TOPIC=execution.started.v1
      - EXECUTION_COMPLETED_TOPIC=execution.completed.v1
      - EXECUTION_FAILED_TOPIC=execution.failed.v1
      - EXECUTION_VERIFIED_TOPIC=execution.verified.v1
      - SERVICENOW_ADAPTER_AUDIT_LOG_PATH=/app/audit/execution_audit.jsonl
    depends_on:
      - kafka
      - execution-service
    networks:
      - sentinel_net
    ports:
      - "8800:8800"

  frontend:
    image: node:18-alpine
    command: sleep 3600
    ports:
      - 5173:5173
    networks:
      - sentinel_net

  test-runner:
    build:
      context: .
      dockerfile: ./tests/Dockerfile.test
    networks:
      - sentinel_net
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - gateway
      - ingestion-service
      - evidence-service
      - kafka
      - redis
      - neo4j
      - postgres
    profiles:
      - test

volumes:
  zookeeper_data:
  kafka_data:
  redis_data:
  neo4j_data:
  postgres_data:
  logs:
