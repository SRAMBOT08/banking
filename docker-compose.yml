version: '3.9'

networks:
  sentinel_net:
    driver: bridge

services:
  zookeeper:
    image: zookeeper:3.8.1
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - sentinel_net
    volumes:
      - zookeeper_data:/bitnami

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    depends_on:
      - zookeeper
    networks:
      - sentinel_net
    volumes:
      - kafka_data:/bitnami
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    networks:
      - sentinel_net
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/testpassword
    networks:
      - sentinel_net
    volumes:
      - neo4j_data:/data

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sentinel
    networks:
      - sentinel_net
    volumes:
      - postgres_data:/var/lib/postgresql/data

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    depends_on: [kafka, postgres]
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SIMULATOR_SERVICE_URL=http://event-simulator:8900
      - INVESTIGATION_SERVICE_URL=http://investigation-service:8500
      - CASE_SERVICE_URL=http://case-service:8950
      - REPORT_SERVICE_URL=http://ai-report-service:8960
      - EXECUTION_SERVICE_URL=http://execution-service:8700
      - GRAPH_SERVICE_URL=http://graph-service:8010
      - SERVICENOW_SERVICE_URL=http://servicenow-adapter:8800
    networks:
      - sentinel_net
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

  ingestion-service:
    build:
      context: .
      dockerfile: ingestion-service/Dockerfile
    environment:
      - SERVICE_NAME=ingestion-service
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://redis:6379/0
      - NORMALIZED_TOPIC=normalized-events.v1
    depends_on:
      - kafka
      - redis
    networks:
      - sentinel_net
    ports:
      - "8100:8100"

  event-simulator:
    build:
      context: .
      dockerfile: event-simulator/Dockerfile
    environment:
      - SERVICE_NAME=event-simulator
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EVENT_TOPIC=events.unified.v1
      - SIMULATOR_TRANSPORT=kafka
      - SIMULATOR_API_PORT=8900
    depends_on:
      - kafka
    networks:
      - sentinel_net
    ports:
      - "8900:8900"

  evidence-service:
    build:
      context: .
      dockerfile: evidence-service/Dockerfile
    environment:
      - SERVICE_NAME=evidence-service
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - NORMALIZED_TOPIC=normalized-events.v1
      - EVIDENCE_GRAPH_TOPIC=evidence.graph.events.v1
      - DLQ_TOPIC=normalized-events.dlq.v1
      - CONSUMER_GROUP=evidence-service-group
    depends_on:
      - kafka
      - neo4j
    networks:
      - sentinel_net
    ports:
      - "8200:8200"

  attack-knowledge-service:
    build:
      context: .
      dockerfile: attack-knowledge-service/Dockerfile
    environment:
      - SERVICE_NAME=attack-knowledge-service
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CONSUMER_TOPIC=evidence.graph.events.v1
      - PRODUCER_TOPIC=investigation.candidates.v1
    depends_on:
      - kafka
      - evidence-service
    networks:
      - sentinel_net
    ports:
      - "8300:8300"

  threat-intelligence-service:
    build:
      context: .
      dockerfile: threat-intelligence-service/Dockerfile
    environment:
      - SERVICE_NAME=threat-intelligence-service
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CONSUMER_TOPIC=evidence.graph.events.v1
      - PRODUCER_TOPIC=investigation.candidates.v1
    depends_on:
      - kafka
      - evidence-service
    networks:
      - sentinel_net
    ports:
      - "8400:8400"

  knowledge-service:
    image: busybox
    command: sleep 3600
    networks:
      - sentinel_net

  graph-service:
    build:
      context: .
      dockerfile: graph-service/Dockerfile
    environment:
      - SERVICE_NAME=graph-intelligence-service
    depends_on:
      - neo4j
    networks:
      - sentinel_net
    ports:
      - "8010:8010"

  memory-service:
    build:
      context: .
      dockerfile: memory-service/Dockerfile
    environment:
      - SERVICE_NAME=investigation-memory-service
    networks:
      - sentinel_net
    ports:
      - "8020:8020"

  investigation-service:
    build:
      context: .
      dockerfile: investigation-service/Dockerfile
    environment:
      - SERVICE_NAME=investigation-service
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CONSUMER_TOPIC=investigation.candidates.v1
      - PRODUCER_TOPIC=investigation.active.v1
      - CONSUMER_GROUP=investigation-service-group
      - COMPLETED_TOPIC=investigation.completed.v1
    depends_on:
      - kafka
    networks:
      - sentinel_net
    ports:
      - "8500:8500"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8500/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

  case-service:
    build:
      context: .
      dockerfile: case-service/Dockerfile
    environment:
      - SERVICE_NAME=case-service
      - CASE_SERVICE_PORT=8950
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - INVESTIGATION_COMPLETED_TOPIC=investigation.completed.v1
      - CASE_CREATED_TOPIC=case.created.v1
    depends_on:
      investigation-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - sentinel_net
    ports:
      - "8950:8950"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8950/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

  ai-report-service:
    build:
      context: .
      dockerfile: ai-report-service/Dockerfile
    environment:
      - SERVICE_NAME=ai-report-service
      - AI_REPORT_SERVICE_PORT=8960
      - NIM_ENDPOINT=${NIM_ENDPOINT:-http://nim:8000/v1/chat/completions}
      - NIM_MODEL=${NIM_MODEL:-meta/llama-3.1-70b-instruct}
      - NIM_API_KEY=${NIM_API_KEY:-}
      - REPORT_PROVIDER=${REPORT_PROVIDER:-mock}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CASE_CREATED_TOPIC=case.created.v1
      - REPORT_GENERATED_TOPIC=report.generated.v1
    depends_on:
      case-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - sentinel_net
    ports:
      - "8960:8960"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8960/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    environment:
      - AI_SERVICE_NAME=ai-investigation-service
      - AI_API_PORT=8600
      - INVESTIGATION_SERVICE_URL=http://investigation-service:8500
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SNAPSHOT_TOPIC=investigation.snapshot.created.v1
      - REASONED_TOPIC=investigation.reasoned.v1
      - REPORT_TOPIC=investigation.report.generated.v1
      - AI_METRICS_TOPIC=investigation.ai.metrics.v1
      - AI_CONSUMER_GROUP=ai-investigation-service-group
      - LLM_PROVIDER=mock
    depends_on:
      kafka:
        condition: service_healthy
      investigation-service:
        condition: service_healthy
    networks:
      - sentinel_net
    ports:
      - "8600:8600"

  execution-service:
    build:
      context: .
      dockerfile: execution-service/Dockerfile
    environment:
      - EXECUTION_SERVICE_NAME=execution-decision-service
      - EXECUTION_API_PORT=8700
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - INVESTIGATION_COMPLETED_TOPIC=investigation.completed.v1
      - EXECUTION_PLAN_CREATED_TOPIC=execution.plan.created.v1
      - EXECUTION_POLICY_CHECKED_TOPIC=execution.policy.checked.v1
      - EXECUTION_AWAITING_APPROVAL_TOPIC=execution.awaiting.approval.v1
      - EXECUTION_APPROVED_TOPIC=execution.approved.v1
      - EXECUTION_READY_TOPIC=execution.completed.v1
      - EXECUTION_STARTED_TOPIC=execution.started.v1
      - EXECUTION_COMPLETED_TOPIC=execution.completed.v1
      - REPORT_GENERATED_TOPIC=report.generated.v1
      - REPORT_DLQ_TOPIC=report.generated.dlq.v1
      - EXECUTION_FAILED_TOPIC=execution.failed.v1
      - EXECUTION_CANCELLED_TOPIC=execution.cancelled.v1
      - EXECUTION_VERIFIED_TOPIC=execution.verified.v1
      - EXECUTION_AUDIT_TOPIC=execution.audit.v1
      - EXECUTION_CONSUMER_GROUP=execution-decision-service-group
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - sentinel_net
    ports:
      - "8700:8700"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8700/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

  servicenow-adapter:
    build:
      context: ./servicenow-adapter
      dockerfile: Dockerfile
    environment:
      - SERVICENOW_ADAPTER_SERVICE_NAME=servicenow-execution-adapter
      - SERVICENOW_ADAPTER_API_PORT=8800
      - SERVICENOW_ADAPTER_LOG_LEVEL=INFO
      - SERVICENOW_BASE_URL=${SERVICENOW_BASE_URL}
      - SERVICENOW_USERNAME=${SERVICENOW_USERNAME}
      - SERVICENOW_PASSWORD=${SERVICENOW_PASSWORD}
      - SERVICENOW_AUTH_MODE=basic
      - SERVICENOW_VERIFY_SSL=true
      - SERVICENOW_TIMEOUT_SECONDS=20
      - SERVICENOW_RETRY_COUNT=3
      - SERVICENOW_RETRY_BASE_DELAY_MS=250
      - SERVICENOW_RETRY_MAX_DELAY_MS=5000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVICENOW_ADAPTER_CONSUMER_GROUP=servicenow-adapter-group
      - EXECUTION_READY_TOPIC=execution.completed.v1
      - EXECUTION_STARTED_TOPIC=execution.started.v1
      - EXECUTION_COMPLETED_TOPIC=execution.completed.v1
      - EXECUTION_FAILED_TOPIC=execution.failed.v1
      - EXECUTION_VERIFIED_TOPIC=execution.verified.v1
      - EXECUTION_SERVICENOW_COMPLETED_TOPIC=execution.servicenow.completed.v1
      - SERVICENOW_ADAPTER_AUDIT_LOG_PATH=/app/audit/execution_audit.jsonl
    depends_on:
      kafka:
        condition: service_healthy
      execution-service:
        condition: service_healthy
    networks:
      - sentinel_net
    ports:
      - "8800:8800"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8800/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:8000}
    depends_on:
      gateway:
        condition: service_started
    ports:
      - "3000:3000"
    networks:
      - sentinel_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  test-runner:
    build:
      context: .
      dockerfile: ./tests/Dockerfile.test
    networks:
      - sentinel_net
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - gateway
      - ingestion-service
      - evidence-service
      - kafka
      - redis
      - neo4j
      - postgres
    profiles:
      - test

volumes:
  zookeeper_data:
  kafka_data:
  redis_data:
  neo4j_data:
  postgres_data:
  logs:
